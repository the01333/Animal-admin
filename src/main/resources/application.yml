spring:
  profiles:
    # 环境切换: dev/prod/test
    active: dev
  application:
    name: animal-adopt-system
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

sa-token:
  token-name: Authorization
  timeout: 604800
  active-timeout: 2592000
  # 是否允许同一账号并发登录（false=新登录会踢掉旧登录）
  is-concurrent: false
  # 在多人登录同一账号时，是否共用一个token
  is-share: false
  token-style: uuid
  is-log: false
  token-prefix: Bearer
