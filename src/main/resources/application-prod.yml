server:
  port: 8080
  servlet:
    context-path: /api

spring:
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.8
  cassandra:
    contact-points: localhost
    port: 9042
    local-datacenter: datacenter1
    keyspace-name: animal_adopt_ai
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/animal_adopt_v2?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      password: root
      database: 3
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 3000ms
        shutdown-timeout: 100ms
  mail:
    host: smtp.qq.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.puxinxiaolin: debug
    org.springframework.web: info
    # 设置日志级别为 debug, 获取 Spring AI 的日志信息
    org.springframework.ai: debug
  pattern:
    console: "%clr{%date{yyyy-MM-dd HH:mm:ss}}{cyan} %clr{[%thread]}{blue} %clr{%-4level}{highlightLevel} %clr{%logger{36}}{magenta}  %clr{%msg%n}{faint}"

minio:
  endpoint: http://localhost:9000
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: animal-adopt
  public-base-url: http://localhost:9000

aliyun:
  sms:
    access-key: ${ALI_ACCESS_KEY}
    secret-key: ${ALI_SECRET_KEY}
    sign-name: "bage财务系统"
    template-code: "SMS_498740321"

# CORS 跨域配置
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173
